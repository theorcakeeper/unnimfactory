<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNNIM FACTORY — 언님팩토리</title>
  <link rel="icon" type="image/svg+xml" href="images/logo_background.svg" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Vue mounts the entire app into this single div -->
  <div id="app"></div>

  <!--
    Vue 3 loaded via CDN as an ES Module — no build tool (Vite/webpack) needed.
    type="module" enables native browser ES module support,
    which lets us use import/export across .js files.
  -->
  <script type="module" src="src/main.js"></script>

</body>
</html>
